<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIZMETRICS 실시간 경영 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --border: #dde1ec;
    --accent: #2563eb;
    --accent2: #f97316;
    --accent3: #16a34a;
    --accent4: #d97706;
    --red: #dc2626;
    --text: #111827;
    --muted: #6b7280;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Nanum Gothic', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 28px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-size: 48px;
    letter-spacing: 4px;
    color: #111827;
    line-height: 1;
    margin-bottom: 4px;
  }

  .header-left h1 span { color: var(--accent); }

  .header-left .subtitle {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .selector-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 6px;
  }

  #quarter-select {
    border: none;
    background: transparent;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    cursor: pointer;
    outline: none;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #15803d;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #16a34a;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .refresh-btn {
    background: #2563eb;
    border: none;
    color: #ffffff;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
  }

  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #dde1ec;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #dashboard { display: none; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-card.c1::before { background: var(--accent); }
  .kpi-card.c2::before { background: var(--accent2); }
  .kpi-card.c3::before { background: var(--accent3); }
  .kpi-card.c4::before { background: var(--accent4); }

  .kpi-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .kpi-value-container {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .kpi-value {
    font-family: var(--font-display);
    font-size: 32px;
    line-height: 1;
    color: var(--text);
  }

  .kpi-full-value {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    opacity: 0.8;
  }

  .charts-main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .charts-sub-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .chart-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .chart-wrap { height: 240px; position: relative; }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { font-family: var(--font-mono); font-size: 10px; color: var(--muted); padding: 10px; border-bottom: 1px solid var(--border); text-align: right; }
  td { padding: 10px; text-align: right; border-bottom: 1px solid var(--surface2); font-family: var(--font-mono); }
  th:first-child, td:first-child { text-align: left; }
  .pos { color: var(--accent3); font-weight: bold; }
  .neg { color: var(--red); font-weight: bold; }

  footer {
    text-align: center;
    padding: 40px 0;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-left">
      <h1>BIZMETRICS <span>LIVE</span></h1>
      <div class="subtitle">실시간 데이터 시각화 · 세부 수치 포함 대시보드</div>
    </div>
    <div class="header-right">
      <div class="selector-group">
        <span class="selector-label" style="font-family: var(--font-mono); font-size: 10px; color: var(--muted);">SELECT QUARTER:</span>
        <select id="quarter-select" onchange="updateView()">
          <option value="latest">최신 데이터</option>
        </select>
      </div>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="status-text">연결 중...</span>
      </div>
      <button class="refresh-btn" onclick="loadData()">새로고침</button>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <p>데이터 로딩 중...</p>
  </div>

  <div id="dashboard">
    <!-- 상단 KPI -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- 메인 차트 -->
    <div class="charts-main-grid">
      <div class="chart-card">
        <div class="chart-title">매출액 및 순이익 추이 (억원)</div>
        <div class="chart-wrap"><canvas id="chart-revenue"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">주가 변동 추이 (원)</div>
        <div class="chart-wrap"><canvas id="chart-stock"></canvas></div>
      </div>
    </div>

    <!-- 서브 차트 -->
    <div class="charts-sub-grid">
      <div class="chart-card">
        <div class="chart-title">판매량 vs 생산량 비교</div>
        <div class="chart-wrap"><canvas id="chart-ops"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">재고 현황 추이</div>
        <div class="chart-wrap"><canvas id="chart-inventory"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">선택 분기 성과 분석 (Radar)</div>
        <div class="chart-wrap"><canvas id="chart-radar"></canvas></div>
      </div>
    </div>

    <!-- 상세 테이블 -->
    <div class="table-card">
      <div class="chart-title">분기별 전체 데이터 요약</div>
      <table>
        <thead>
          <tr>
            <th>분기</th>
            <th>매출(억)</th>
            <th>순이익(억)</th>
            <th>주가(원)</th>
            <th>판매량</th>
            <th>생산량</th>
            <th>재고량</th>
            <th>자산(억)</th>
          </tr>
        </thead>
        <tbody id="data-table-body"></tbody>
      </table>
    </div>
  </div>

  <footer>BIZMETRICS ANALYTICS · GOOGLE SHEETS INTEGRATED</footer>
</div>

<script>
const BASE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPTKmm_hG92QRCzImrWjvn8wDbXIyMxe_rOBEgqKt3mAdbB78im4lk2J9SK0v_mrYm90z8Jpi1_Adi/pub?gid=278633911&single=true&output=csv';

let allData = [];
let charts = {};

function cleanNumber(val) {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  let s = val.toString().trim();
  const isNegative = (s.includes('(') && s.includes(')')) || s.startsWith('-');
  s = s.replace(/[^\d.]/g, ''); 
  let num = parseFloat(s);
  return isNegative ? -num : num;
}

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  
  const targetUrl = BASE_CSV_URL + `&t=${new Date().getTime()}`;

  const tryFetch = async (url) => {
    try {
      const res = await fetch(url);
      if (res.ok) return await res.text();
    } catch (e) { return null; }
    return null;
  };

  try {
    let csvText = await tryFetch(targetUrl) || await tryFetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
    if (!csvText) throw new Error('Fetch Failed');

    const lines = csvText.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    
    allData = lines.slice(1).map(line => {
      const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
      const obj = {};
      headers.forEach((header, i) => {
        let val = values[i] ? values[i].replace(/"/g, '').trim() : '';
        obj[header] = val;
      });
      
      const findVal = (keywords) => {
        const key = Object.keys(obj).find(k => keywords.some(kw => k.toLowerCase().includes(kw.toLowerCase())));
        return cleanNumber(obj[key]);
      };

      return {
        분기: obj[headers[0]] || 'N/A',
        매출: findVal(['매출']),
        순이익: findVal(['순이익']),
        주가: findVal(['주가']),
        판매량: findVal(['판매량']),
        생산량: findVal(['생산량']),
        재고량: findVal(['재고량']),
        자산: findVal(['자산'])
      };
    });

    populateSelector();
    document.getElementById('status-text').textContent = '데이터 연결됨';
    updateView();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } catch (e) {
    document.getElementById('status-text').textContent = '연결 실패';
    console.error(e);
  }
}

function populateSelector() {
  const select = document.getElementById('quarter-select');
  const current = select.value;
  select.innerHTML = '<option value="latest">최신 데이터</option>';
  allData.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = d.분기;
    select.appendChild(opt);
  });
  if (current !== 'latest' && current < allData.length) select.value = current;
}

function updateView() {
  const select = document.getElementById('quarter-select');
  const idx = select.value === 'latest' ? allData.length - 1 : parseInt(select.value);
  const selected = allData[idx];

  renderKPIs(selected);
  renderTable();
  renderAllCharts(idx);
}

function renderKPIs(d) {
  const grid = document.getElementById('kpi-grid');
  const items = [
    { label: `${d.분기} 매출액`, val: (d.매출/1e8).toFixed(1) + '억', full: d.매출.toLocaleString() + '원', cls: 'c1' },
    { label: `${d.분기} 순이익`, val: (d.순이익/1e8).toFixed(1) + '억', full: d.순이익.toLocaleString() + '원', cls: 'c2' },
    { label: `분기말 주가`, val: d.주가.toLocaleString() + '원', full: 'STOCK PRICE', cls: 'c3' },
    { label: `기말 자산`, val: (d.자산/1e8).toFixed(1) + '억', full: d.자산.toLocaleString() + '원', cls: 'c4' }
  ];
  
  grid.innerHTML = items.map(i => `
    <div class="kpi-card ${i.cls}">
      <div class="kpi-label">${i.label}</div>
      <div class="kpi-value-container">
        <div class="kpi-value">${i.val}</div>
        <div class="kpi-full-value">${i.full}</div>
      </div>
    </div>
  `).join('');
}

function renderTable() {
  const tbody = document.getElementById('data-table-body');
  tbody.innerHTML = allData.map(d => `
    <tr>
      <td>${d.분기}</td>
      <td>${(d.매출/1e8).toFixed(1)}</td>
      <td class="${d.순이익 < 0 ? 'neg' : 'pos'}">${(d.순이익/1e8).toFixed(1)}</td>
      <td>${d.주가.toLocaleString()}</td>
      <td>${d.판매량.toLocaleString()}</td>
      <td>${d.생산량.toLocaleString()}</td>
      <td>${d.재고량.toLocaleString()}</td>
      <td>${(d.자산/1e8).toFixed(1)}</td>
    </tr>
  `).join('');
}

function renderAllCharts(sIdx) {
  const labels = allData.map(d => d.분기);
  const selected = allData[sIdx];

  destroyAndCreate('chart-revenue', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '매출(억)', data: allData.map(d => (d.매출/1e8).toFixed(1)), backgroundColor: labels.map((_, i) => i === sIdx ? '#2563eb' : '#cbd5e1') },
        { label: '순이익(억)', data: allData.map(d => (d.순이익/1e8).toFixed(1)), type: 'line', borderColor: '#f97316', tension: 0.3 }
      ]
    }
  });

  destroyAndCreate('chart-stock', {
    type: 'line',
    data: {
      labels,
      datasets: [{ label: '주가(원)', data: allData.map(d => d.주가), borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,0.1)', fill: true, tension: 0.2 }]
    }
  });

  destroyAndCreate('chart-ops', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '판매량', data: allData.map(d => d.판매량), backgroundColor: '#6366f1' },
        { label: '생산량', data: allData.map(d => d.생산량), backgroundColor: '#94a3b8' }
      ]
    }
  });

  destroyAndCreate('chart-inventory', {
    type: 'line',
    data: {
      labels,
      datasets: [{ label: '재고량', data: allData.map(d => d.재고량), borderColor: '#dc2626', pointBackgroundColor: '#dc2626' }]
    }
  });

  const maxSales = Math.max(...allData.map(d => d.매출));
  destroyAndCreate('chart-radar', {
    type: 'radar',
    data: {
      labels: ['판매효율', '매출성장', '수익성', '안정성', '재고관리'],
      datasets: [{
        label: selected.분기,
        data: [
          (selected.판매량 / (selected.생산량 || 1) * 100),
          (selected.매출 / maxSales * 100),
          (selected.순이익 / (selected.매출 || 1) * 500),
          (selected.자산 / Math.max(...allData.map(d => d.자산)) * 100),
          (100 - (selected.재고량 / (selected.생산량 || 1) * 100))
        ],
        backgroundColor: 'rgba(37, 99, 235, 0.2)', borderColor: '#2563eb'
      }]
    },
    options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } } }
  });
}

function destroyAndCreate(id, config) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  const defaultConfig = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { size: 10 } } } }
  };
  charts[id] = new Chart(ctx, { ...config, options: { ...defaultConfig, ...config.options } });
}

window.onload = loadData;
</script>
</body>
</html>
